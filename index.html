<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base Planner · Live Map</title>

    <!-- Firebase (compat SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js">
    </script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js">
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

    <style>
        /* ===== MINECRAFT THEME (same as original) ===== */
        :root {
            --bg: #1b140c;
            --dirt: #3c2b1c;
            --dirt-lt: #4f3a26;
            --slot: #241a11;
            --bevel-hi: #7a5d3f;
            --bevel-lo: #120d08;
            --grass: #63973a;
            --grass-dark: #436726;
            --gold: #d8a83c;
            --redstone: #a5382a;
            --redstone-dark: #7c281d;
            --text: #eee2c8;
            --text-dim: #a3937a;
            --pixel: 'Press Start 2P', monospace;
            --chunky: 'VT323', monospace;
        }
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
        }
        html,
        body {
            margin: 0;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        h1,
        h2,
        h3,
        .pixel {
            font-family: var(--pixel);
        }

        .bevel {
            border-top: 3px solid var(--bevel-hi);
            border-left: 3px solid var(--bevel-hi);
            border-bottom: 3px solid var(--bevel-lo);
            border-right: 3px solid var(--bevel-lo);
            border-radius: 0;
        }
        .bevel:active {
            border-top: 3px solid var(--bevel-lo);
            border-left: 3px solid var(--bevel-lo);
            border-bottom: 3px solid var(--bevel-hi);
            border-right: 3px solid var(--bevel-hi);
        }

        /* ---------- LOGIN ---------- */
        #loginScreen {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 18px;
            background:
                linear-gradient(rgba(27, 20, 12, .85), rgba(27, 20, 12, .85)),
                repeating-conic-gradient(#241a11 0% 25%, #2c2015 0% 50%) 0 0/16px 16px;
        }
        #loginScreen h1 {
            font-size: 1rem;
            letter-spacing: .02em;
            color: var(--gold);
            margin-bottom: 0;
            text-shadow: 2px 2px 0 #000;
        }
        #loginScreen p.sub {
            color: var(--text-dim);
            margin-top: 2px;
            font-size: 1.05rem;
            font-family: var(--chunky);
        }
        .card {
            background: var(--dirt);
            padding: 22px;
            width: 280px;
            border-top: 3px solid var(--bevel-hi);
            border-left: 3px solid var(--bevel-hi);
            border-bottom: 3px solid var(--bevel-lo);
            border-right: 3px solid var(--bevel-lo);
        }
        select,
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 9px 8px;
            margin-top: 6px;
            margin-bottom: 14px;
            background: var(--slot);
            border-top: 2px solid var(--bevel-lo);
            border-left: 2px solid var(--bevel-lo);
            border-bottom: 2px solid var(--bevel-hi);
            border-right: 2px solid var(--bevel-hi);
            border-radius: 0;
            color: var(--text);
            font-size: 1.05rem;
            font-family: var(--chunky);
        }
        label {
            font-size: .72rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: .08em;
            font-family: var(--pixel);
        }
        button {
            background: var(--grass-dark);
            color: #fff;
            padding: 10px 16px;
            border-radius: 0;
            font-size: 1.05rem;
            font-family: var(--chunky);
            letter-spacing: .03em;
            cursor: pointer;
            border-top: 3px solid var(--bevel-hi);
            border-left: 3px solid var(--bevel-hi);
            border-bottom: 3px solid var(--bevel-lo);
            border-right: 3px solid var(--bevel-lo);
        }
        button:hover {
            background: var(--grass);
        }
        button:active {
            border-top: 3px solid var(--bevel-lo);
            border-left: 3px solid var(--bevel-lo);
            border-bottom: 3px solid var(--bevel-hi);
            border-right: 3px solid var(--bevel-hi);
        }
        #loginMsg {
            color: var(--redstone);
            font-size: .9rem;
            min-height: 18px;
            margin-top: 6px;
            font-family: var(--chunky);
        }

        /* ---------- APP SHELL ---------- */
        #app {
            display: none;
            height: 100%;
            flex-direction: column;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: var(--dirt);
            border-bottom: 3px solid var(--bevel-lo);
            flex-wrap: wrap;
            gap: 8px;
            z-index: 10;
        }
        header h1 {
            font-size: .7rem;
            color: var(--gold);
            margin: 0;
            text-shadow: 1px 1px 0 #000;
        }
        header .who {
            color: var(--text-dim);
            font-size: 1rem;
            font-family: var(--chunky);
        }
        header .who b {
            color: var(--text);
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--slot);
            padding: 4px;
            border-top: 2px solid var(--bevel-lo);
            border-left: 2px solid var(--bevel-lo);
            border-bottom: 2px solid var(--bevel-hi);
            border-right: 2px solid var(--bevel-hi);
        }
        .tabs button {
            background: var(--dirt-lt);
            color: var(--text-dim);
            padding: 8px 14px;
            font-size: .95rem;
            border-top: 2px solid var(--bevel-hi);
            border-left: 2px solid var(--bevel-hi);
            border-bottom: 2px solid var(--bevel-lo);
            border-right: 2px solid var(--bevel-lo);
        }
        .tabs button.active {
            background: var(--dirt);
            color: var(--gold);
            border: 2px solid var(--gold);
            box-shadow: 0 0 0 1px #000 inset;
        }

        main {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        section.view {
            display: none;
            height: 100%;
            width: 100%;
        }
        section.view.active {
            display: flex;
        }

        /* ---------- MAP VIEW ---------- */
        #mapView {
            flex-direction: row;
        }

        #toolbar {
            width: 170px;
            background: var(--dirt);
            border-right: 3px solid var(--bevel-lo);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 20;
        }
        #toolbar h3 {
            font-size: .55rem;
            text-transform: uppercase;
            color: var(--gold);
            margin: 8px 0 2px;
            letter-spacing: .05em;
            font-family: var(--pixel);
        }
        .tool-btn {
            background: var(--slot);
            color: var(--text);
            border-top: 2px solid var(--bevel-hi);
            border-left: 2px solid var(--bevel-hi);
            border-bottom: 2px solid var(--bevel-lo);
            border-right: 2px solid var(--bevel-lo);
            text-align: left;
            padding: 6px 10px;
            font-size: 1rem;
            font-family: var(--chunky);
            width: 100%;
        }
        .tool-btn.active {
            background: var(--grass-dark);
            border-color: var(--gold);
            color: #fff;
            border-top: 2px solid var(--gold);
            border-left: 2px solid var(--gold);
        }
        #colorPicker {
            width: 100%;
            height: 34px;
            border: none;
            background: var(--slot);
            padding: 2px;
            cursor: pointer;
            border-top: 2px solid var(--bevel-lo);
            border-left: 2px solid var(--bevel-lo);
            border-bottom: 2px solid var(--bevel-hi);
            border-right: 2px solid var(--bevel-hi);
        }
        #mapContainer {
            flex: 1;
            background: #100c07;
            position: relative;
        }
        #mapContainer .leaflet-container {
            height: 100%;
            width: 100%;
            background: #1a130c;
        }
        /* Override leaflet draw styles to match theme a bit */
        .leaflet-draw-toolbar a {
            background: var(--slot) !important;
            color: var(--text) !important;
            border-color: var(--bevel-hi) !important;
        }
        .leaflet-draw-toolbar a:hover {
            background: var(--dirt-lt) !important;
        }
        .leaflet-draw-actions a {
            background: var(--dirt) !important;
            color: var(--text) !important;
        }
        .leaflet-draw-actions a:hover {
            background: var(--grass-dark) !important;
        }

        /* ---------- BLOCK LIST ---------- */
        #listView {
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
            max-width: 640px;
            margin: 0 auto;
            width: 100%;
        }
        #addItemRow {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        #addItemRow input {
            margin: 0;
            flex: 1;
            min-width: 100px;
        }
        #addItemRow input#itemQty {
            max-width: 80px;
            flex: 0 0 80px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--chunky);
        }
        th,
        td {
            text-align: left;
            padding: 8px 6px;
            border-bottom: 2px solid var(--dirt-lt);
            font-size: 1.05rem;
        }
        th {
            color: var(--gold);
            font-weight: 400;
            text-transform: uppercase;
            font-size: .65rem;
            font-family: var(--pixel);
        }
        tr.done td {
            opacity: .4;
            text-decoration: line-through;
        }
        td.actions {
            text-align: right;
            white-space: nowrap;
        }
        td.actions button {
            padding: 5px 9px;
            font-size: .85rem;
            margin-left: 4px;
        }
        .del-btn {
            background: var(--redstone-dark);
        }
        .del-btn:hover {
            background: var(--redstone);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 700px) {
            #mapView {
                flex-direction: column;
            }
            #toolbar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                border-right: none;
                border-bottom: 3px solid var(--bevel-lo);
                padding: 8px;
                max-height: 180px;
                overflow-y: auto;
                gap: 4px;
            }
            #toolbar h3 {
                margin: 2px 4px 0 0;
                font-size: .5rem;
                width: 100%;
            }
            .tool-btn {
                padding: 4px 8px;
                font-size: .85rem;
                width: auto;
                flex: 0 1 auto;
            }
            #colorPicker {
                width: 40px;
                height: 30px;
            }
            header h1 {
                font-size: .5rem;
            }
            .tabs button {
                padding: 4px 10px;
                font-size: .75rem;
            }
            #listView {
                padding: 10px;
            }
            th,
            td {
                font-size: .85rem;
                padding: 4px 4px;
            }
        }
        @media (max-width: 480px) {
            header {
                flex-direction: column;
                align-items: stretch;
                gap: 4px;
            }
            .tabs {
                justify-content: center;
            }
            header .who {
                font-size: .85rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== LOGIN ==================== -->
    <div id="loginScreen">
        <h1>BASE PLANNER</h1>
        <p class="sub">⛏ play.contentveen.nl · team map</p>
        <div class="card">
            <label>Who are you?</label>
            <select id="userSelect"></select>
            <label id="pwLabel">Password</label>
            <input type="password" id="pwInput" placeholder="Password" />
            <button id="loginBtn" style="width:100%">Enter</button>
            <div id="loginMsg"></div>
        </div>
    </div>

    <!-- ==================== APP ==================== -->
    <div id="app">
        <header>
            <h1>BASE PLANNER</h1>
            <div class="tabs">
                <button id="tabMap" class="active">🗺 Map</button>
                <button id="tabList">📦 Blocks</button>
            </div>
            <div class="who">Logged in as <b id="whoName"></b> · <a href="#" id="logoutLink" style="color:var(--redstone)">log out</a></div>
        </header>

        <main>
            <!-- MAP VIEW -->
            <section id="mapView" class="view active">
                <div id="toolbar">
                    <a href="https://play.contentveen.nl" target="_blank" rel="noopener"
                    class="tool-btn" style="display:block;text-align:center;text-decoration:none;color:var(--gold);border-color:var(--gold);">
                    🗺 Open live map ↗
                </a>
                <h3>Draw</h3>
                <button class="tool-btn active" id="drawPolyline">✏️ Pen</button>
                <button class="tool-btn" id="drawRectangle">▭ Build zone</button>
                <button class="tool-btn" id="drawMarker">📍 Pin</button>
                <button class="tool-btn" id="drawDelete">🧹 Erase</button>
                <h3>Color</h3>
                <input type="color" id="colorPicker" value="#7ba05b" />
                <h3>Map</h3>
                <button class="tool-btn" id="resetMapView">⟲ Reset view</button>
                <button class="tool-btn" id="clearAllDrawings">Clear all drawings</button>
            </div>
            <div id="mapContainer"></div>
        </section>

        <!-- BLOCK LIST VIEW -->
        <section id="listView" class="view">
            <div id="addItemRow">
                <input type="text" id="itemName" placeholder="Block / item (e.g. Oak Planks)" />
                <input type="text" id="itemQty" placeholder="Qty" />
                <button id="addItemBtn">Add</button>
            </div>
            <table>
                <thead><tr><th>Item</th><th>Qty</th><th>Requested by</th><th></th></tr></thead>
                <tbody id="listBody"></tbody>
            </table>
        </section>
    </main>
</div>

<!-- ============================================================
JAVASCRIPT
============================================================ -->
<script>
    /* =========================================================
       1. FIREBASE CONFIG (same as original)
       ========================================================= */
    const firebaseConfig = {
        apiKey: "AIzaSyD1VnsqIwZ6a0UvA2kSeQuFRaZoGYuqFfQ",
        authDomain: "basemap-planner.firebaseapp.com",
        databaseURL: "https://basemap-planner-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "basemap-planner",
        storageBucket: "basemap-planner.firebasestorage.app",
        messagingSenderId: "928571574145",
        appId: "1:928571574145:web:76ee79906822d358f88a80"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;

    /* ---------- password hash ---------- */
    async function sha256(str) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    /* ---------- LOGIN ---------- */
    const TEAM_MEMBERS = ["BigChicken135", "circus12en34", "FlyingDutchman55", "Netti_"];
    const userSelect = document.getElementById("userSelect");
    TEAM_MEMBERS.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        userSelect.appendChild(opt);
    });

    document.getElementById("loginBtn").onclick = async () => {
        const name = userSelect.value;
        const pw = document.getElementById("pwInput").value;
        const msg = document.getElementById("loginMsg");
        if (!pw) { msg.textContent = "Enter a password."; return; }

        const snap = await db.ref("users/" + name).get();
        const hash = await sha256(pw);

        if (!snap.exists() || !snap.val().passwordHash) {
            await db.ref("users/" + name).set({ passwordHash: hash });
            logIn(name);
        } else if (snap.val().passwordHash === hash) {
            logIn(name);
        } else {
            msg.textContent = "Wrong password.";
        }
    };

    function logIn(name) {
        currentUser = name;
        document.getElementById("whoName").textContent = name;
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        initMap();
        initList();
    }

    document.getElementById("logoutLink").onclick = (e) => {
        e.preventDefault();
        currentUser = null;
        document.getElementById("app").style.display = "none";
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("pwInput").value = "";
        if (map) { map.remove();
            map = null; }
    };

    /* ---------- TABS ---------- */
    document.getElementById("tabMap").onclick = () => switchTab("mapView", "tabMap");
    document.getElementById("tabList").onclick = () => switchTab("listView", "tabList");

    function switchTab(viewId, tabId) {
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
        document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
        document.getElementById(viewId).classList.add("active");
        document.getElementById(tabId).classList.add("active");
        // If switching to map, invalidate size
        if (viewId === "mapView" && map) {
            setTimeout(() => map.invalidateSize(), 100);
        }
    }

    /* =========================================================
       2. MAP + LEAFLET + LEAFLET.DRAW
       ========================================================= */
    let map = null;
    let drawnItems = null;
    let drawControl = null;
    let currentColor = "#7ba05b";
    let isDrawingSync = false; // prevent feedback loops

    function initMap() {
        const container = document.getElementById("mapContainer");

        // Create map
        map = L.map(container, {
            center: [51.505, -0.09],
            zoom: 13,
            zoomControl: false,
            attributionControl: true,
        });

        // Tile layer (OpenStreetMap)
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Zoom control (top-right)
        L.control.zoom({ position: "topright" }).addTo(map);

        // Feature group for drawings
        drawnItems = L.featureGroup().addTo(map);

        // ---------- Draw control ----------
        drawControl = new L.Control.Draw({
            position: "topright",
            draw: {
                polyline: {
                    shapeOptions: { color: currentColor, weight: 4, opacity: 0.9 }
                },
                rectangle: {
                    shapeOptions: { color: currentColor, weight: 3, opacity: 0.8, fillOpacity: 0.2 }
                },
                marker: {
                    icon: L.divIcon({
                        className: "minecraft-pin",
                        html: "📍",
                        iconSize: [24, 24],
                        iconAnchor: [12, 24]
                    })
                },
                circle: false,
                polygon: false,
                circlemarker: false,
            },
            edit: {
                featureGroup: drawnItems,
                remove: true,
            }
        });
        map.addControl(drawControl);

        // ---------- Handle draw events ----------
        map.on(L.Draw.Event.CREATED, function(e) {
            const layer = e.layer;
            const type = e.layerType;
            const color = currentColor;

            // Store color in layer properties
            if (type === "polyline" || type === "rectangle") {
                layer.setStyle({ color: color });
            }
            if (type === "marker") {
                // store color in a custom property
                layer.options._drawColor = color;
            }

            // Generate GeoJSON
            const geojson = layer.toGeoJSON();
            const entry = {
                type: type,
                geojson: geojson,
                color: color,
                author: currentUser || "unknown",
                ts: Date.now()
            };

            // Push to Firebase
            const ref = db.ref("drawings").push();
            entry.id = ref.key;
            ref.set(entry);

            // Add to feature group
            drawnItems.addLayer(layer);
        });

        // ---------- Handle edit/delete events ----------
        map.on(L.Draw.Event.DELETED, function(e) {
            e.layers.eachLayer(function(layer) {
                // Find and remove from Firebase
                const id = layer._firebaseId;
                if (id) {
                    db.ref("drawings/" + id).remove();
                }
            });
        });

        map.on(L.Draw.Event.EDITED, function(e) {
            e.layers.eachLayer(function(layer) {
                const id = layer._firebaseId;
                if (id) {
                    const geojson = layer.toGeoJSON();
                    db.ref("drawings/" + id).update({ geojson: geojson });
                }
            });
        });

        // ---------- Sync from Firebase ----------
        db.ref("drawings").on("value", function(snap) {
            if (isDrawingSync) return;
            isDrawingSync = true;

            const data = snap.val() || {};
            // Remove layers that are no longer in Firebase
            const existingIds = new Set();
            drawnItems.eachLayer(function(layer) {
                if (layer._firebaseId && !data[layer._firebaseId]) {
                    drawnItems.removeLayer(layer);
                } else if (layer._firebaseId) {
                    existingIds.add(layer._firebaseId);
                }
            });

            // Add or update layers from Firebase
            Object.entries(data).forEach(([id, entry]) => {
                if (!entry.geojson) return;
                // Check if already exists
                let existing = null;
                drawnItems.eachLayer(function(layer) {
                    if (layer._firebaseId === id) existing = layer;
                });

                if (existing) {
                    // Update existing
                    const newLayer = L.geoJSON(entry.geojson, {
                        style: { color: entry.color || "#7ba05b", weight: 4, opacity: 0.9,
                            fillOpacity: 0.2 }
                    }).getLayers()[0];
                    if (newLayer) {
                        const bounds = existing.getBounds ? existing.getBounds() : null;
                        const latlng = existing.getLatLng ? existing.getLatLng() : null;
                        drawnItems.removeLayer(existing);
                        if (newLayer) {
                            newLayer._firebaseId = id;
                            drawnItems.addLayer(newLayer);
                            // Restore position for markers
                            if (entry.type === "marker" && latlng) {
                                newLayer.setLatLng(latlng);
                            }
                        }
                    }
                } else {
                    // Add new
                    const layer = L.geoJSON(entry.geojson, {
                        style: { color: entry.color || "#7ba05b", weight: 4, opacity: 0.9,
                            fillOpacity: 0.2 }
                    }).getLayers()[0];
                    if (layer) {
                        layer._firebaseId = id;
                        drawnItems.addLayer(layer);
                    }
                }
            });

            isDrawingSync = false;
        });

        // ---------- Color picker sync with draw tool ----------
        document.getElementById("colorPicker").oninput = function(e) {
            currentColor = e.target.value;
            // Update draw control styles
            if (drawControl) {
                const drawOptions = drawControl.options.draw;
                if (drawOptions) {
                    if (drawOptions.polyline) drawOptions.polyline.shapeOptions.color = currentColor;
                    if (drawOptions.rectangle) drawOptions.rectangle.shapeOptions.color = currentColor;
                }
            }
        };

        // ---------- Tool buttons ----------
        document.getElementById("drawPolyline").onclick = function() {
            setDrawTool("polyline");
            highlightTool(this);
        };
        document.getElementById("drawRectangle").onclick = function() {
            setDrawTool("rectangle");
            highlightTool(this);
        };
        document.getElementById("drawMarker").onclick = function() {
            setDrawTool("marker");
            highlightTool(this);
        };
        document.getElementById("drawDelete").onclick = function() {
            setDrawTool("delete");
            highlightTool(this);
        };

        function setDrawTool(tool) {
            if (!map || !drawControl) return;
            // If delete, enable edit mode with remove
            if (tool === "delete") {
                new L.Draw.Polyline(map, drawControl.options.draw.polyline).disable();
                // Enable edit mode
                if (drawControl._toolbars && drawControl._toolbars.edit) {
                    drawControl._toolbars.edit.enable();
                }
                return;
            }
            // Disable edit mode
            if (drawControl._toolbars && drawControl._toolbars.edit) {
                drawControl._toolbars.edit.disable();
            }
            // Enable draw tool
            if (tool === "polyline") {
                new L.Draw.Polyline(map, drawControl.options.draw.polyline).enable();
            } else if (tool === "rectangle") {
                new L.Draw.Rectangle(map, drawControl.options.draw.rectangle).enable();
            } else if (tool === "marker") {
                new L.Draw.Marker(map, drawControl.options.draw.marker).enable();
            }
        }

        function highlightTool(btn) {
            document.querySelectorAll("#toolbar .tool-btn").forEach(b => b.classList.remove("active"));
            if (btn) btn.classList.add("active");
        }

        // ---------- Reset map view ----------
        document.getElementById("resetMapView").onclick = function() {
            if (map) {
                map.setView([51.505, -0.09], 13);
            }
        };

        // ---------- Clear all drawings ----------
        document.getElementById("clearAllDrawings").onclick = function() {
            if (confirm("Clear ALL drawings for everyone?")) {
                db.ref("drawings").remove();
            }
        };

        // ---------- Handle resize ----------
        setTimeout(() => map.invalidateSize(), 200);
        window.addEventListener("resize", () => { if (map) map.invalidateSize(); });

        // ---------- Initial tool: polyline ----------
        setTimeout(() => {
            setDrawTool("polyline");
            document.getElementById("drawPolyline").classList.add("active");
        }, 300);
    }

    /* =========================================================
       3. BLOCK LIST (unchanged from original)
       ========================================================= */
    function initList() {
        document.getElementById("addItemBtn").onclick = addItem;
        document.getElementById("itemName").addEventListener("keydown", (e) => { if (e.key === "Enter") addItem(); });
        document.getElementById("itemQty").addEventListener("keydown", (e) => { if (e.key === "Enter") addItem(); });

        db.ref("blocklist").on("value", snap => {
            const items = snap.val() || {};
            const body = document.getElementById("listBody");
            body.innerHTML = "";
            Object.entries(items).sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0)).forEach(([id, item]) => {
                const tr = document.createElement("tr");
                if (item.done) tr.classList.add("done");
                tr.innerHTML =
                    `<td>${escapeHtml(item.name)}</td><td>${escapeHtml(item.qty||"")}</td><td>${escapeHtml(item.requestedBy||"")}</td><td class="actions"></td>`;
                const actions = tr.querySelector(".actions");
                const doneBtn = document.createElement("button");
                doneBtn.textContent = item.done ? "Undo" : "Got it";
                doneBtn.onclick = () => db.ref("blocklist/" + id).update({ done: !item.done });
                const delBtn = document.createElement("button");
                delBtn.textContent = "✕";
                delBtn.className = "del-btn";
                delBtn.onclick = () => db.ref("blocklist/" + id).remove();
                actions.append(doneBtn, delBtn);
                body.appendChild(tr);
            });
        });
    }

    function addItem() {
        const name = document.getElementById("itemName").value.trim();
        const qty = document.getElementById("itemQty").value.trim();
        if (!name) return;
        db.ref("blocklist").push({ name, qty, requestedBy: currentUser, done: false, ts: Date.now() });
        document.getElementById("itemName").value = "";
        document.getElementById("itemQty").value = "";
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;",
            "'": "&#39;" } [m]));
    }

    /* =========================================================
       4. KEYBOARD SHORTCUTS (optional)
       ========================================================= */
    document.addEventListener("keydown", (e) => {
        if (e.key === "1") { document.getElementById("drawPolyline").click();
            e.preventDefault(); }
        if (e.key === "2") { document.getElementById("drawRectangle").click();
            e.preventDefault(); }
        if (e.key === "3") { document.getElementById("drawMarker").click();
            e.preventDefault(); }
        if (e.key === "4") { document.getElementById("drawDelete").click();
            e.preventDefault(); }
    });
</script>
</body>
